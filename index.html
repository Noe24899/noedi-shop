        /* ໂລໂກ້ແນວນອນ + ໄຟ RGB */
        .logo-container { 
            position: relative; width: 100%; max-width: 1000px; margin: 20px auto;

        }

        .page { display: none; }

body {

        currentP = products[i];
        document.getElementById('d-img').src = currentP.img;
        document.getElementById('d-name').innerText = currentP.name;
        document.getElementById('d-desc').innerText = currentP.desc;
        showPage('detail');
    }

        document.querySelectorAll('.page').forEach(x => x.style.display='none');

            document.getElementById('qr-img').src = currentP.qrs[q-1];
        }
    }

        let msg = `ຕິດຕໍ່ການສັ່ງຊື້: ${currentP.name} | ຈຳນວນ: ${q} ຊິ້ນ. ລາຄາ: ${(q*currentP.price).toLocaleString()} ₭. 🥰✅.`;
        window.location.href = `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;
    }

// ຟັງຊັນຄິດໄລ່ລາຄາອັດຕະໂນມັດ
function updatePrice() {
    let q = document.getElementById('qty').value || 1;
    let total = q * currentP.price;
    document.getElementById('total-price').innerText = total.toLocaleString();
}

      function openDetail(i) {
        currentP = products[i];
        document.getElementById('d-img').src = currentP.img;
        document.getElementById('d-name').innerText = currentP.name;
        document.getElementById('d-desc').innerText = currentP.desc;
        
        // --- ເພີ່ມ 2 ແຖວນີ້ໃສ່ບ່ອນນີ້ ---
        document.getElementById('qty').value = 1; 
        updatePrice(); 
        // -----------------------------
        
        showPage('detail');
    }

function changeQty(val) {
    let input = document.getElementById('qty');
    let newVal = parseInt(input.value) + val;
    
    // ກວດສອບບໍ່ໃຫ້ຫຼຸດ 1 ຫຼື ເກີນ 5
    if (newVal >= 1 && newVal <= 5) {
        input.value = newVal;
        updatePrice(); // ອັບເດດລາຄາທັນທີເມື່ອກົດ
    }
}

  function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('theme-toggle');
    
    body.classList.toggle('light-mode');
    
    // ປ່ຽນໄອຄອນ
    if (body.classList.contains('light-mode')) {
        btn.innerText = '🌥️';
    } else {
        btn.innerText = '🌜';
    }
}

  
function updatePrice() {
    let q = parseInt(document.getElementById('qty').value) || 1;
    let basePrice = q * currentP.price;
    let finalPrice = basePrice;
    let hasDiscount = false;

    // --- ເງື່ອນໄຂສ່ວນຫຼຸດສະເພາະສິນຄ້າ ---

    // 1. YouTube: ຫຼຸດສະເພາະ 3 ຊິ້ນ
    if (currentP.name === "YouTube") {
        if (q == 3) { finalPrice = 100000; hasDiscount = true; } 
        else if (q == 4) { finalPrice = 120000; hasDiscount = true; }
        else if (q == 5) { finalPrice = 150000; hasDiscount = true; }
        else {
            finalPrice = q * currentP.price;
            hasDiscount = false;
        }
    } 
    // 2. RedM: ຫຼຸດຕາມຈຳນວນທີ່ກຳນົດ
    else if (currentP.name === "RedM") {
        if (q == 2) { finalPrice = 200000; hasDiscount = true; }
        else if (q == 3) { finalPrice = 300000; hasDiscount = true; }
        else if (q == 4) { finalPrice = 400000; hasDiscount = true; }
        else if (q == 5) { finalPrice = 500000; hasDiscount = true; }
        else {
            finalPrice = q * currentP.price;
            hasDiscount = false;
        }
    }
      else if (currentP.name === "Windows 10/11") {
        if (q == 3) { finalPrice = 100000; hasDiscount = true; }
        else if (q == 4) { finalPrice = 150000; hasDiscount = true; }
        else if (q == 5) { finalPrice = 150000; hasDiscount = true; }
        else {
            finalPrice = q * currentP.price;
            hasDiscount = false;
        }
      }
    // 3. ເພີ່ມສິນຄ້າໂຕຕໍ່ໄປກໍໃຊ້ else if ແບບນີ້ໄປເລື້ອຍໆ...
    else if (currentP.name === "ຊື່ສິນຄ້າອື່ນ") {
        // ເພີ່ມເງື່ອນໄຂຢູ່ບ່ອນນີ້
    }

    // --- ສະແດງຜົນ (ຫ້າມແກ້ໄຂສ່ວນນີ້) ---
    if (hasDiscount) {
        document.getElementById('old-price').innerText = basePrice.toLocaleString() + "₭";
        document.getElementById('old-price').style.display = 'inline';
    } else {
        document.getElementById('old-price').style.display = 'none';
    }
    document.getElementById('total-price').innerText = finalPrice.toLocaleString();
}
